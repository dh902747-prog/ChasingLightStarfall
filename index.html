<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #0a0a1a;
            overflow: hidden;
            cursor: crosshair;
            position: relative;
            font-family: -apple-system, sans-serif;
            user-select: none;
        }

        /* 提示文字 */
        .hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.5s;
            text-align: center;
            line-height: 2;
        }

        .hint.hidden {
            opacity: 0;
        }

        /* 长按进度指示器 */
        .long-press-indicator {
            position: absolute;
            width: 60px;
            height: 60px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
        }

        .long-press-indicator svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .long-press-indicator circle {
            fill: none;
            stroke: #ff6b6b;
            stroke-width: 4;
            stroke-linecap: round;
        }

        .long-press-indicator .bg {
            stroke: rgba(255, 107, 107, 0.2);
        }

        .long-press-indicator .progress {
            stroke-dasharray: 157;
            stroke-dashoffset: 157;
            transition: stroke-dashoffset linear;
        }

        /* Kimi 容器 - 普通 */
        .kimi-container {
            position: absolute;
            width: 84px;
            height: 84px;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        /* Kimi 容器 - 超大 */
        .kimi-container.super {
            width: 168px;
            height: 168px;
            z-index: 10;
        }

        /* Kimi 主体 */
        .kimi-face {
            position: absolute;
            width: 56px;
            height: 56px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(180deg, #4a9eff 0%, #1e6fdb 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 20px rgba(74, 158, 255, 0.4),
                0 0 40px rgba(74, 158, 255, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.3);
            animation: breathe 2s ease-in-out infinite;
        }

        /* 超大 Kimi 脸 */
        .kimi-container.super .kimi-face {
            width: 112px;
            height: 112px;
            box-shadow: 
                0 0 40px rgba(74, 158, 255, 0.6),
                0 0 80px rgba(74, 158, 255, 0.4),
                0 0 120px rgba(74, 158, 255, 0.2),
                inset 0 3px 6px rgba(255, 255, 255, 0.4);
            animation: breatheSuper 3s ease-in-out infinite;
        }

        .eyes {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            animation: eyesBlink 4s ease-in-out infinite;
        }

        .kimi-container.super .eyes {
            gap: 20px;
            top: 33%;
        }

        .eye {
            width: 10px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .kimi-container.super .eye {
            width: 20px;
            height: 28px;
        }

        /* 生命周期进度环 */
        .life-ring {
            position: absolute;
            width: 70px;
            height: 70px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            opacity: 0.6;
        }

        .kimi-container.super .life-ring {
            width: 140px;
            height: 140px;
            opacity: 0.8;
        }

        .life-ring circle {
            fill: none;
            stroke: rgba(74, 158, 255, 0.3);
            stroke-width: 2;
        }

        .life-ring .progress {
            stroke: #4a9eff;
            stroke-linecap: round;
            transition: stroke-dashoffset linear;
        }

        .kimi-container.super .life-ring .progress {
            stroke: #ffd93d;
        }

        /* 粒子 */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #4a9eff;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(74, 158, 255, 0.8);
        }

        .kimi-container.super ~ .particle,
        .particle.super {
            width: 8px;
            height: 8px;
            box-shadow: 0 0 12px rgba(255, 217, 61, 0.8);
            background: #ffd93d;
        }

        /* 动画定义 */
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        @keyframes breatheSuper {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.08); }
        }

        @keyframes eyesBlink {
            0%, 45%, 55%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(0.1); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        /* 消散状态 */
        .kimi-container.dying .kimi-face {
            animation: fadeOut 0.3s ease-out forwards;
        }

        .kimi-container.dying .life-ring {
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* 超大 Kimi 特殊样式 */
        .kimi-container.super::after {
            content: '👑';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            animation: float 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
    </style>

</head>
<body>
    <div class="hint" id="hint">
        <small style="font-size: 14px; color: rgba(255,255,255,0.2)"></small>
    </div>

    <script>
        // 配置
        const CONFIG = {
            normal: {
                size: 84,
                faceSize: 56,
                lifetime: 5000,
                fadeDuration: 800,
                particleCount: 40,
                color: '#4a9eff'
            },
            super: {
                size: 168,
                faceSize: 112,
                lifetime: 10000,      // 超大存活 15 秒
                fadeDuration: 1500,
                particleCount: 80,     // 更多粒子
                color: '#ffd93d'
            },
            longPressTime: 800       // 长按触发时间 ms
        };

        const hint = document.getElementById('hint');
        let hintShown = true;
        let longPressTimer = null;
        let isLongPress = false;
        let pressIndicator = null;

        // 存储所有 Kimi 的位置和半径（用于碰撞检测）
        const kimis = new Map(); // id -> {x, y, radius, element}

        // 生成唯一 ID
        let kimiIdCounter = 0;
        function generateId() {
            return 'kimi-' + (++kimiIdCounter);
        }

        // 检查点击位置是否在现有 Kimi 范围内
        function isOnKimi(x, y) {
            for (const [id, kimi] of kimis) {
                const dx = x - kimi.x;
                const dy = y - kimi.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < kimi.radius) {
                    return true;
                }
            }
            return false;
        }

        // 创建长按指示器
        function createPressIndicator(x, y) {
            const indicator = document.createElement('div');
            indicator.className = 'long-press-indicator';
            indicator.style.left = x + 'px';
            indicator.style.top = y + 'px';

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 60 60');

            const bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            bgCircle.setAttribute('class', 'bg');
            bgCircle.setAttribute('cx', '30');
            bgCircle.setAttribute('cy', '30');
            bgCircle.setAttribute('r', '25');

            const progressCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            progressCircle.setAttribute('class', 'progress');
            progressCircle.setAttribute('cx', '30');
            progressCircle.setAttribute('cy', '30');
            progressCircle.setAttribute('r', '25');

            svg.appendChild(bgCircle);
            svg.appendChild(progressCircle);
            indicator.appendChild(svg);
            document.body.appendChild(indicator);

            // 触发进度动画
            requestAnimationFrame(() => {
                progressCircle.style.strokeDashoffset = '0';
                progressCircle.style.transitionDuration = CONFIG.longPressTime + 'ms';
            });

            return indicator;
        }

        // 鼠标按下
        document.addEventListener('mousedown', (e) => {
            // 只处理左键和右键
            if (e.button !== 0 && e.button !== 2) return;

            // 检查是否在 Kimi 上
            if (isOnKimi(e.clientX, e.clientY)) {
                return; // 在 Kimi 上，不生成
            }

            // 隐藏提示
            if (hintShown) {
                hint.classList.add('hidden');
                hintShown = false;
            }

            // 右键开始长按检测
            if (e.button === 2) {
                isLongPress = false;
                pressIndicator = createPressIndicator(e.clientX, e.clientY);

                longPressTimer = setTimeout(() => {
                    isLongPress = true;
                    // 移除指示器
                    if (pressIndicator) {
                        pressIndicator.remove();
                        pressIndicator = null;
                    }
                    // 生成超大 Kimi
                    createKimi(e.clientX, e.clientY, true);
                }, CONFIG.longPressTime);
            }
        });

        // 鼠标松开
        document.addEventListener('mouseup', (e) => {
            // 清除长按计时
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }

            // 移除指示器
            if (pressIndicator) {
                pressIndicator.remove();
                pressIndicator = null;
            }

            // 如果是左键点击，且不是长按，生成普通 Kimi
            if (e.button === 0 && !isLongPress) {
                // 再次检查（防止按下和抬起位置不同）
                if (!isOnKimi(e.clientX, e.clientY)) {
                    createKimi(e.clientX, e.clientY, false);
                }
            }

            isLongPress = false;
        });

        // 鼠标移动（取消长按如果移动太远）
        document.addEventListener('mousemove', (e) => {
            if (pressIndicator && longPressTimer) {
                // 可以在这里添加移动距离检测，简单处理：不检测
            }
        });

        // 阻止右键菜单
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        function createKimi(x, y, isSuper) {
            const config = isSuper ? CONFIG.super : CONFIG.normal;
            const id = generateId();

            // 记录 Kimi 信息（用于碰撞检测）
            kimis.set(id, {
                x: x,
                y: y,
                radius: config.size / 2,
                element: null
            });

            const container = document.createElement('div');
            container.className = 'kimi-container' + (isSuper ? ' super' : '');
            container.style.left = x + 'px';
            container.style.top = y + 'px';
            container.dataset.id = id;

            // 生命环 SVG
            const ringSize = isSuper ? 140 : 70;
            const ringRadius = isSuper ? 66 : 33;
            const circumference = 2 * Math.PI * ringRadius;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'life-ring');
            svg.setAttribute('viewBox', `0 0 ${ringSize} ${ringSize}`);

            const bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            bgCircle.setAttribute('cx', ringSize / 2);
            bgCircle.setAttribute('cy', ringSize / 2);
            bgCircle.setAttribute('r', ringRadius);

            const progressCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            progressCircle.setAttribute('class', 'progress');
            progressCircle.setAttribute('cx', ringSize / 2);
            progressCircle.setAttribute('cy', ringSize / 2);
            progressCircle.setAttribute('r', ringRadius);
            progressCircle.setAttribute('stroke-dasharray', circumference);
            progressCircle.setAttribute('stroke-dashoffset', '0');
            progressCircle.style.transitionDuration = config.lifetime + 'ms';

            svg.appendChild(bgCircle);
            svg.appendChild(progressCircle);

            // Kimi 脸
            const face = document.createElement('div');
            face.className = 'kimi-face';

            const eyes = document.createElement('div');
            eyes.className = 'eyes';

            const leftEye = document.createElement('div');
            leftEye.className = 'eye';

            const rightEye = document.createElement('div');
            rightEye.className = 'eye';

            eyes.appendChild(leftEye);
            eyes.appendChild(rightEye);
            face.appendChild(eyes);

            container.appendChild(svg);
            container.appendChild(face);
            document.body.appendChild(container);

            // 保存元素引用
            kimis.get(id).element = container;

            // 触发进度环动画
            requestAnimationFrame(() => {
                progressCircle.style.strokeDashoffset = circumference;
            });

            // 定时消散
            setTimeout(() => {
                disintegrate(id, x, y, isSuper);
            }, config.lifetime);
        }

        function disintegrate(id, centerX, centerY, isSuper) {
            const kimi = kimis.get(id);
            if (!kimi) return;

            const container = kimi.element;
            container.classList.add('dying');

            const config = isSuper ? CONFIG.super : CONFIG.normal;
            const rect = container.querySelector('.kimi-face').getBoundingClientRect();
            const faceCenterX = rect.left + rect.width / 2;
            const faceCenterY = rect.top + rect.height / 2;
            const faceRadius = rect.width / 2;

            // 生成粒子
            const particles = [];
            for (let i = 0; i < config.particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle' + (isSuper ? ' super' : '');

                // 圆形范围内随机分布
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * faceRadius;
                const startX = faceCenterX + Math.cos(angle) * distance;
                const startY = faceCenterY + Math.sin(angle) * distance;

                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';
                particle.style.opacity = '1';

                document.body.appendChild(particle);

                // 飞散参数
                const flyAngle = Math.random() * Math.PI * 2;
                const flyDistance = 80 + Math.random() * (isSuper ? 200 : 120);
                const destX = Math.cos(flyAngle) * flyDistance;
                const destY = Math.sin(flyAngle) * flyDistance;
                const scale = 0.5 + Math.random() * (isSuper ? 2 : 1.5);
                const rotate = Math.random() * 720 - 360;

                const duration = config.fadeDuration * (0.6 + Math.random() * 0.8);

                particle.animate([
                    { 
                        transform: 'translate(-50%, -50%) scale(1)', 
                        opacity: 1 
                    },
                    { 
                        transform: `translate(calc(-50% + ${destX}px), calc(-50% + ${destY}px)) scale(${scale}) rotate(${rotate}deg)`, 
                        opacity: 0 
                    }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                    fill: 'forwards'
                }).onfinish = () => particle.remove();
            }

            // 清理 Kimi
            setTimeout(() => {
                container.remove();
                kimis.delete(id);
            }, 300);
        }
    </script>
</body>
</html>
