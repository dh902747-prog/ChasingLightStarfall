<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Keys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Courier New', monospace;
            color: #fff;
            padding: 20px;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .key {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            color: #555;
            text-transform: uppercase;
        }

        .key:hover:not(.lit):not(.cleared) {
            border-color: #666;
        }

        .key.lit {
            background: #fff;
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            animation: pulse 1.2s ease-in-out infinite;
        }

        .key.cleared {
            background: #000;
            border-color: #222;
            color: #222;
        }

        .key.wrong {
            animation: shake 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .info {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #444;
            letter-spacing: 2px;
        }

        .start-btn {
            margin-top: 20px;
            padding: 10px 40px;
            font-size: 0.9rem;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .start-btn:hover {
            background: #ccc;
        }

        /* 特殊键宽度 */
        .key-tab { width: 75px; }
        .key-caps { width: 85px; }
        .key-enter { width: 90px; }
        .key-shift { width: 110px; }
        .key-space { width: 280px; }
        .key-ctrl { width: 65px; }
        .key-fn { width: 50px; }

        /* 不可点击的装饰键 */
        .key.dead {
            cursor: default;
            color: #222;
            border-color: #1a1a1a;
        }
        .key.dead:hover {
            border-color: #1a1a1a;
        }

        @media (max-width: 700px) {
            .key { width: 36px; height: 36px; font-size: 0.8rem; }
            .key-tab { width: 55px; }
            .key-caps { width: 65px; }
            .key-enter { width: 70px; }
            .key-shift { width: 85px; }
            .key-space { width: 200px; }
            .key-ctrl { width: 50px; }
            .key-fn { width: 36px; }
        }
    </style>
</head>
<body>
    <div class="keyboard" id="keyboard"></div>

    <div class="info" id="info">Press SPACE or Click to Start</div>
    <button class="start-btn" id="startBtn" onclick="startGame()">Play</button>

    <script>
        // 真实键盘布局 (只取字母行)
        const KEYBOARD_LAYOUT = [
            ['`', '1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '-', '=', '⌫'],
            ['⇥', 'Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P', '[', ']', '\\'],
            ['⇪', 'A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L', ';', '\'', '⏎'],
            ['⇧', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', ',', '.', '/', '⇧'],
            ['⌃', '⌥', '⌘', ' ', '⌘', '⌥', '⌃']
        ];

        // 可点击的字母
        const PLAYABLE_KEYS = 'QWERTYUIOPASDFGHJKLZXCVBNM'.split('');

        let gameState = {
            isPlaying: false,
            round: 0,
            litKeys: new Set(),
            clearedKeys: new Set(),
            canClick: false,
            baseCount: 3,
            intervalId: null
        };

        const keyboardEl = document.getElementById('keyboard');
        const infoEl = document.getElementById('info');
        const startBtn = document.getElementById('startBtn');

        function initKeyboard() {
            keyboardEl.innerHTML = '';
            KEYBOARD_LAYOUT.forEach((row, rowIndex) => {
                const rowEl = document.createElement('div');
                rowEl.className = 'row';

                row.forEach(key => {
                    const keyEl = document.createElement('div');
                    keyEl.className = 'key';
                    keyEl.textContent = key;

                    // 特殊宽度类
                    if (key === '⇥') keyEl.classList.add('key-tab');
                    else if (key === '⇪') keyEl.classList.add('key-caps');
                    else if (key === '⏎') keyEl.classList.add('key-enter');
                    else if (key === '⇧') keyEl.classList.add('key-shift');
                    else if (key === ' ') keyEl.classList.add('key-space');
                    else if (['⌃','⌥','⌘'].includes(key)) keyEl.classList.add('key-ctrl');
                    else if (key === '⌫') keyEl.classList.add('key-fn');

                    // 只有字母可玩
                    if (!PLAYABLE_KEYS.includes(key)) {
                        keyEl.classList.add('dead');
                    } else {
                        keyEl.dataset.letter = key;
                        keyEl.onclick = () => handleClick(key);
                    }

                    rowEl.appendChild(keyEl);
                });

                keyboardEl.appendChild(rowEl);
            });
        }

        function getLitCount() {
            // 每5轮增加1个，最高12个
            return Math.min(gameState.baseCount + Math.floor(gameState.round / 5), 12);
        }

        function getRandomLetters(count) {
            const shuffled = [...PLAYABLE_KEYS].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        function lightUpKeys() {
            gameState.litKeys.clear();
            gameState.clearedKeys.clear();
            gameState.canClick = false;

            document.querySelectorAll('.key').forEach(k => {
                k.classList.remove('lit', 'cleared', 'wrong');
            });

            const count = getLitCount();
            const letters = getRandomLetters(count);

            letters.forEach((letter, index) => {
                gameState.litKeys.add(letter);
                setTimeout(() => {
                    const el = document.querySelector(`[data-letter="${letter}"]`);
                    if (el) el.classList.add('lit');
                }, index * 180);
            });

            setTimeout(() => {
                gameState.canClick = true;
                infoEl.textContent = `第 ${gameState.round + 1} 轮 · ${count} 个`;
            }, letters.length * 180 + 250);
        }

        function handleClick(letter) {
            if (!gameState.isPlaying || !gameState.canClick) return;

            const el = document.querySelector(`[data-letter="${letter}"]`);

            if (gameState.litKeys.has(letter) && !gameState.clearedKeys.has(letter)) {
                gameState.clearedKeys.add(letter);
                el.classList.remove('lit');
                el.classList.add('cleared');

                if (gameState.clearedKeys.size === gameState.litKeys.size) {
                    gameState.canClick = false;
                    gameState.round++;

                    infoEl.textContent = '完成';

                    setTimeout(() => {
                        lightUpKeys();
                    }, 600);
                }
            } else if (!gameState.litKeys.has(letter) || gameState.clearedKeys.has(letter)) {
                el.classList.add('wrong');
                setTimeout(() => el.classList.remove('wrong'), 300);
            }
        }

        function startGame() {
            gameState = {
                isPlaying: true,
                round: 0,
                litKeys: new Set(),
                clearedKeys: new Set(),
                canClick: false,
                baseCount: 3,
                intervalId: null
            };

            startBtn.style.display = 'none';
            lightUpKeys();
        }

        // 键盘物理按键支持
        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (PLAYABLE_KEYS.includes(key)) {
                // 视觉反馈
                const el = document.querySelector(`[data-letter="${key}"]`);
                if (el) {
                    el.style.transform = 'scale(0.92)';
                    setTimeout(() => el.style.transform = '', 100);
                }
                handleClick(key);
            }
            // 空格开始
            if (key === ' ' && !gameState.isPlaying) {
                startGame();
            }
        });

        initKeyboard();
    </script>
</body>
</html>
