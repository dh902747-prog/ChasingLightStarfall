<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi 粒子世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #0a0a1a;
            overflow: hidden;
            cursor: crosshair;
            position: relative;
            font-family: -apple-system, sans-serif;
        }

        /* 提示文字 */
        .hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.5s;
        }

        .hint.hidden {
            opacity: 0;
        }

        /* Kimi 容器 */
        .kimi-container {
            position: absolute;
            width: 84px;
            height: 84px;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        /* Kimi 主体 */
        .kimi-face {
            position: absolute;
            width: 56px;
            height: 56px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(180deg, #4a9eff 0%, #1e6fdb 100%);
            border-radius: 50%;
            box-shadow:
                0 0 20px rgba(74, 158, 255, 0.4),
                0 0 40px rgba(74, 158, 255, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.3);
            animation: breathe 2s ease-in-out infinite;
        }

        .eyes {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            animation: eyesBlink 4s ease-in-out infinite;
        }

        .eye {
            width: 10px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* 生命周期进度环 */
        .life-ring {
            position: absolute;
            width: 70px;
            height: 70px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            opacity: 0.6;
        }

        .life-ring circle {
            fill: none;
            stroke: rgba(74, 158, 255, 0.3);
            stroke-width: 2;
        }

        .life-ring .progress {
            stroke: #4a9eff;
            stroke-linecap: round;
            transition: stroke-dashoffset linear;
        }

        /* 粒子 */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #4a9eff;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(74, 158, 255, 0.8);
        }

        /* 动画定义 */
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        @keyframes eyesBlink {
            0%, 45%, 55%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(0.1); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        /* 消散状态 */
        .kimi-container.dying .kimi-face {
            animation: fadeOut 0.3s ease-out forwards;
        }

        .kimi-container.dying .life-ring {
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="hint" id="hint">点击空白处，生成 Kimi ✨</div>

    <script>
        const LIFETIME = 5000; // 存活时间 5秒
        const FADE_DURATION = 800; // 消散动画时长

        const hint = document.getElementById('hint');
        let hintShown = true;

        document.addEventListener('click', (e) => {
            // 隐藏提示
            if (hintShown) {
                hint.classList.add('hidden');
                hintShown = false;
            }

            createKimi(e.clientX, e.clientY);
        });

        function createKimi(x, y) {
            const container = document.createElement('div');
            container.className = 'kimi-container';
            container.style.left = x + 'px';
            container.style.top = y + 'px';

            // 生命环 SVG
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'life-ring');
            svg.setAttribute('viewBox', '0 0 70 70');

            const bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            bgCircle.setAttribute('cx', '35');
            bgCircle.setAttribute('cy', '35');
            bgCircle.setAttribute('r', '33');

            const progressCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            progressCircle.setAttribute('class', 'progress');
            progressCircle.setAttribute('cx', '35');
            progressCircle.setAttribute('cy', '35');
            progressCircle.setAttribute('r', '33');

            const circumference = 2 * Math.PI * 33;
            progressCircle.setAttribute('stroke-dasharray', circumference);
            progressCircle.setAttribute('stroke-dashoffset', '0');
            progressCircle.style.transitionDuration = LIFETIME + 'ms';

            svg.appendChild(bgCircle);
            svg.appendChild(progressCircle);

            // Kimi 脸
            const face = document.createElement('div');
            face.className = 'kimi-face';

            const eyes = document.createElement('div');
            eyes.className = 'eyes';

            const leftEye = document.createElement('div');
            leftEye.className = 'eye';

            const rightEye = document.createElement('div');
            rightEye.className = 'eye';

            eyes.appendChild(leftEye);
            eyes.appendChild(rightEye);
            face.appendChild(eyes);

            container.appendChild(svg);
            container.appendChild(face);
            document.body.appendChild(container);

            // 触发进度环动画（下一帧）
            requestAnimationFrame(() => {
                progressCircle.style.strokeDashoffset = circumference;
            });

            // 定时消散
            setTimeout(() => {
                disintegrate(container, x, y);
            }, LIFETIME);
        }

        function disintegrate(container, centerX, centerY) {
            container.classList.add('dying');

            // 获取脸的位置（相对视口）
            const rect = container.querySelector('.kimi-face').getBoundingClientRect();
            const faceCenterX = rect.left + rect.width / 2;
            const faceCenterY = rect.top + rect.height / 2;
            const faceRadius = rect.width / 2;

            // 生成粒子
            const particleCount = 40;
            const particles = [];

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                // 在圆形范围内随机分布
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * faceRadius;
                const startX = faceCenterX + Math.cos(angle) * distance;
                const startY = faceCenterY + Math.sin(angle) * distance;

                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';
                particle.style.opacity = '1';

                document.body.appendChild(particle);
                particles.push(particle);

                // 随机飞散方向和距离
                const flyAngle = Math.random() * Math.PI * 2;
                const flyDistance = 80 + Math.random() * 120;
                const destX = Math.cos(flyAngle) * flyDistance;
                const destY = Math.sin(flyAngle) * flyDistance;
                const scale = 0.5 + Math.random() * 1.5;
                const rotate = Math.random() * 720 - 360;

                // 动画
                const duration = 600 + Math.random() * 400;

                particle.animate([
                    {
                        transform: 'translate(-50%, -50%) scale(1)',
                        opacity: 1
                    },
                    {
                        transform: `translate(calc(-50% + ${destX}px), calc(-50% + ${destY}px)) scale(${scale}) rotate(${rotate}deg)`,
                        opacity: 0
                    }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                    fill: 'forwards'
                }).onfinish = () => particle.remove();
            }

            // 清理 Kimi 容器
            setTimeout(() => {
                container.remove();
            }, 300);
        }
    </script>
</body>
</html>
