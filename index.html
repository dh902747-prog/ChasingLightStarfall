<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Keys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Courier New', monospace;
            color: #fff;
            padding: 20px;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .key {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            color: #555;
            text-transform: uppercase;
        }

        .key:hover:not(.lit):not(.cleared) {
            border-color: #666;
        }

        .key.lit {
            background: #fff;
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        .key.cleared {
            background: #000;
            border-color: #222;
            color: #222;
        }

        .key.wrong {
            animation: shake 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .info {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #444;
            letter-spacing: 2px;
        }

        .start-btn {
            margin-top: 20px;
            padding: 10px 40px;
            font-size: 0.9rem;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .start-btn:hover {
            background: #ccc;
        }

        /* 特殊键宽度 */
        .key-tab { width: 75px; }
        .key-caps { width: 85px; }
        .key-enter { width: 90px; }
        .key-shift { width: 110px; }
        .key-space { width: 280px; }
        .key-ctrl { width: 65px; }
        .key-fn { width: 50px; }

        /* 不可点击的装饰键 */
        .key.dead {
            cursor: default;
            color: #222;
            border-color: #1a1a1a;
        }
        .key.dead:hover {
            border-color: #1a1a1a;
        }

        @media (max-width: 700px) {
            .key { width: 36px; height: 36px; font-size: 0.8rem; }
            .key-tab { width: 55px; }
            .key-caps { width: 65px; }
            .key-enter { width: 70px; }
            .key-shift { width: 85px; }
            .key-space { width: 200px; }
            .key-ctrl { width: 50px; }
            .key-fn { width: 36px; }
        }

        /* ===== 进度条样式 ===== */
        .timer-bar-container {
            width: 100%;
            max-width: 600px;
            height: 6px;
            background: #000;
            margin-bottom: 20px;
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .timer-bar-container.active {
            opacity: 1;
        }

        .timer-bar-fill {
            width: 100%;
            height: 100%;
            background: #fff;
            transform-origin: left;
        }

        .timer-bar-fill.running {
            animation: barDrain 2s linear forwards;
        }

        @keyframes barDrain {
            0% { transform: scaleX(1); }
            100% { transform: scaleX(0); }
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .game-over-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-text {
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: #fff;
        }

        .retry-btn {
            padding: 12px 50px;
            font-size: 1rem;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="timer-bar-container" id="timerBarContainer">
        <div class="timer-bar-fill" id="timerBarFill"></div>
    </div>

    <div class="keyboard" id="keyboard"></div>

    <div class="info" id="info">Press SPACE or Click to Start</div>
    <button class="start-btn" id="startBtn" onclick="startGame()">Play</button>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-text">TIME'S UP</div>
        <button class="retry-btn" onclick="retryGame()">RETRY</button>
    </div>

    <script>
        const KEYBOARD_LAYOUT = [
            ['`', '1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '-', '=', '⌫'],
            ['⇥', 'Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P', '[', ']', '\\'],
            ['⇪', 'A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L', ';', '\'', '⏎'],
            ['⇧', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', ',', '.', '/', '⇧'],
            ['⌃', '⌥', '⌘', ' ', '⌘', '⌥', '⌃']
        ];

        const PLAYABLE_KEYS = 'QWERTYUIOPASDFGHJKLZXCVBNM'.split('');

        let gameState = {
            isPlaying: false,
            round: 0,
            litKeys: new Set(),
            clearedKeys: new Set(),
            canClick: false,
            baseCount: 3,
            intervalId: null,
            timerTimeoutId: null,
            lightUpTimeouts: []
        };

        const keyboardEl = document.getElementById('keyboard');
        const infoEl = document.getElementById('info');
        const startBtn = document.getElementById('startBtn');
        const timerBarContainer = document.getElementById('timerBarContainer');
        const timerBarFill = document.getElementById('timerBarFill');
        const gameOverOverlay = document.getElementById('gameOverOverlay');

        function initKeyboard() {
            keyboardEl.innerHTML = '';
            KEYBOARD_LAYOUT.forEach((row) => {
                const rowEl = document.createElement('div');
                rowEl.className = 'row';

                row.forEach(key => {
                    const keyEl = document.createElement('div');
                    keyEl.className = 'key';
                    keyEl.textContent = key;

                    if (key === '⇥') keyEl.classList.add('key-tab');
                    else if (key === '⇪') keyEl.classList.add('key-caps');
                    else if (key === '⏎') keyEl.classList.add('key-enter');
                    else if (key === '⇧') keyEl.classList.add('key-shift');
                    else if (key === ' ') keyEl.classList.add('key-space');
                    else if (['⌃','⌥','⌘'].includes(key)) keyEl.classList.add('key-ctrl');
                    else if (key === '⌫') keyEl.classList.add('key-fn');

                    if (!PLAYABLE_KEYS.includes(key)) {
                        keyEl.classList.add('dead');
                    } else {
                        keyEl.dataset.letter = key;
                        keyEl.onclick = () => handleClick(key);
                    }

                    rowEl.appendChild(keyEl);
                });

                keyboardEl.appendChild(rowEl);
            });
        }

        function getLitCount() {
            return Math.min(gameState.baseCount + Math.floor(gameState.round / 5), 12);
        }

        function getRandomLetters(count) {
            const shuffled = [...PLAYABLE_KEYS].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        function clearAllTimeouts() {
            if (gameState.timerTimeoutId) {
                clearTimeout(gameState.timerTimeoutId);
                gameState.timerTimeoutId = null;
            }
            gameState.lightUpTimeouts.forEach(id => clearTimeout(id));
            gameState.lightUpTimeouts = [];
        }

        function startTimer() {
            if (gameState.timerTimeoutId) {
                clearTimeout(gameState.timerTimeoutId);
            }
            timerBarFill.classList.remove('running');
            void timerBarFill.offsetWidth;
            timerBarContainer.classList.add('active');
            timerBarFill.classList.add('running');

            gameState.timerTimeoutId = setTimeout(() => {
                gameOver();
            }, 2000);
        }

        function stopTimer() {
            clearAllTimeouts();
            timerBarFill.classList.remove('running');
            timerBarContainer.classList.remove('active');
        }

        function gameOver() {
            gameState.isPlaying = false;
            gameState.canClick = false;
            stopTimer();
            document.querySelectorAll('.key.lit').forEach(k => k.classList.remove('lit'));
            gameOverOverlay.classList.add('show');
        }

        function retryGame() {
            gameOverOverlay.classList.remove('show');
            startGame();
        }

        function lightUpKeys() {
            gameState.litKeys.clear();
            gameState.clearedKeys.clear();
            gameState.canClick = false;

            document.querySelectorAll('.key').forEach(k => {
                k.classList.remove('lit', 'cleared', 'wrong');
            });

            const count = getLitCount();
            const letters = getRandomLetters(count);

            letters.forEach((letter, index) => {
                gameState.litKeys.add(letter);
                const id = setTimeout(() => {
                    if (!gameState.isPlaying) return;
                    const el = document.querySelector(`[data-letter="${letter}"]`);
                    if (el) el.classList.add('lit');
                }, index * 180);
                gameState.lightUpTimeouts.push(id);
            });

            const id = setTimeout(() => {
                if (!gameState.isPlaying) return;
                gameState.canClick = true;
                infoEl.textContent = `第 ${gameState.round + 1} 轮 · ${count} 个`;
                startTimer();
            }, letters.length * 180 + 250);
            gameState.lightUpTimeouts.push(id);
        }

        function handleClick(letter) {
            if (!gameState.isPlaying || !gameState.canClick) return;

            const el = document.querySelector(`[data-letter="${letter}"]`);

            if (gameState.litKeys.has(letter) && !gameState.clearedKeys.has(letter)) {
                gameState.clearedKeys.add(letter);
                el.classList.remove('lit');
                el.classList.add('cleared');

                if (gameState.clearedKeys.size === gameState.litKeys.size) {
                    gameState.canClick = false;
                    gameState.round++;
                    stopTimer();
                    infoEl.textContent = '完成';

                    const id = setTimeout(() => {
                        if (!gameState.isPlaying) return;
                        lightUpKeys();
                    }, 600);
                    gameState.lightUpTimeouts.push(id);
                }
            } else if (!gameState.litKeys.has(letter) || gameState.clearedKeys.has(letter)) {
                el.classList.add('wrong');
                setTimeout(() => el.classList.remove('wrong'), 300);
            }
        }

        function startGame() {
            if (gameState.isPlaying) return;

            clearAllTimeouts();

            gameState = {
                isPlaying: true,
                round: 0,
                litKeys: new Set(),
                clearedKeys: new Set(),
                canClick: false,
                baseCount: 3,
                intervalId: null,
                timerTimeoutId: null,
                lightUpTimeouts: []
            };

            startBtn.style.display = 'none';
            gameOverOverlay.classList.remove('show');
            lightUpKeys();
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (PLAYABLE_KEYS.includes(key)) {
                const el = document.querySelector(`[data-letter="${key}"]`);
                if (el) {
                    el.style.transform = 'scale(0.92)';
                    setTimeout(() => el.style.transform = '', 100);
                }
                handleClick(key);
            }
            if (key === ' ' && !gameState.isPlaying) {
                startGame();
            }
        });

        initKeyboard();
    </script>
</body>
</html>
