<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>高密度粒子 仅圈内烟花爆炸</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
  }
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w, h;
let mouse = { x: null, y: null };
let particles = [];

// ========== 可调参数 ==========
const particleNum = 350;     // 粒子数量 已拉满
const lineDistance = 90;
const attractRange = 200;     // 吸附范围偏大
const attractStrength = 0.015;// 吸附粘度适中
const fireSpeedMin = 6;
const fireSpeedMax = 15;     // 炸开力度超大
const fireDecay = 0.87;
const lockTime = 80;         // 炸开后很久才恢复吸附
// =============================

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.radius = Math.random() * 1.0 + 0.2;
    this.vx = Math.random() * 0.25 - 0.125;
    this.vy = Math.random() * 0.25 - 0.125;
    this.fireVx = 0;
    this.fireVy = 0;
    this.lockFrame = 0;
  }

  isInAttractRange() {
    if(mouse.x === null) return false;
    let dx = mouse.x - this.x;
    let dy = mouse.y - this.y;
    let dist = Math.hypot(dx, dy);
    return dist < attractRange;
  }

  update() {
    if (this.x < 0 || this.x > w) this.vx *= -1;
    if (this.y < 0 || this.y > h) this.vy *= -1;

    this.fireVx *= fireDecay;
    this.fireVy *= fireDecay;

    if(this.lockFrame > 0) this.lockFrame--;

    if (this.lockFrame <= 0 && this.isInAttractRange()) {
      let dx = mouse.x - this.x;
      let dy = mouse.y - this.y;
      this.x += dx * attractStrength;
      this.y += dy * attractStrength;
    }

    this.x += this.vx + this.fireVx;
    this.y += this.vy + this.fireVy;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(120, 200, 255, 0.9)';
    ctx.fill();
  }

  fireWork() {
    let angle = Math.random() * Math.PI * 2;
    let speed = Math.random() * (fireSpeedMax - fireSpeedMin) + fireSpeedMin;
    this.fireVx = Math.cos(angle) * speed;
    this.fireVy = Math.sin(angle) * speed;
    this.lockFrame = lockTime;
  }
}

function initParticle() {
  particles = [];
  for (let i = 0; i < particleNum; i++) {
    particles.push(new Particle());
  }
}

function drawLine() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a + 1; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let d = Math.hypot(dx, dy);
      if (d < lineDistance) {
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.strokeStyle = `rgba(120, 200, 255, ${(lineDistance - d)/lineDistance * 0.2})`;
        ctx.lineWidth = 0.3;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(0, 0, w, h);

  particles.forEach(p => {
    p.update();
    p.draw();
  });
  drawLine();
  requestAnimationFrame(animate);
}

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener('mousedown', () => {
  particles.forEach(p => {
    if (p.isInAttractRange()) {
      p.fireWork();
    }
  });
});

initParticle();
animate();
</script>
</body>
</html>
